<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>WebAR Mô Hình Chim - AR.js GPS</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene 
      embedded 
      vr-mode-ui="enabled: false" 
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false; trackingMethod: planar;">
      
      <a-assets>
        <a-asset-item id="bird-obj" src="./assets/10012_crab_v2_iterations-1.obj"></a-asset-item>
        <a-asset-item id="bird-mtl" src="./assets/10012_crab_v2_iterations-1.mtl"></a-asset-item>
      </a-assets>
      
      <a-entity 
        gps-entity-place="latitude: 10.421500; longitude: 105.6433072;"
        position="0 0 0"
        scale="0.05 0.05 0.05"
        rotation="0 0 0"> <a-obj-model  
          src="#bird-obj" 
          mtl="#bird-mtl">
        </a-obj-model>

      </a-entity>
      
      <a-entity camera gps-camera="simulateLatitude: 10.421500; simulateLongitude: 105.6433072;" rotation-reader></a-entity>
      
    </a-scene>
  </body>
</html>
